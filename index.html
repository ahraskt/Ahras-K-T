<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample HTML Page git</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #007BFF;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Welcome to HTML</h1>
    <p>This is a simple HTML page with CSS and JavaScript.</p>
    <p>hello world</p>
    <button onclick="showMessage()">Click Me</button>

    <script>
        function showMessage() {
            alert("Hi! Welcome to HTML.");
        }
    </script>

</body>
</html>
